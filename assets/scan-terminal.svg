    <line x1="20" y1="338" x2="740" y2="338" stroke="#26282b"/>
    <text x="20" y="362" fill="#d6d8da">  <tspan font-weight="700">58</tspan> project files  →  <tspan font-weight="700">5</tspan> real folder(s)  →  <tspan fill="#ff6b6b" font-weight="700">53 duplicate(s)</tspan></text>
    <text x="20" y="388" fill="#6b7075">  Run `consolidate --apply` to keep one entry per folder.</text>
