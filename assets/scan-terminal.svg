    <text x="60" y="168" fill="#ff6b6b">dup <tspan fill="#8a8d90"> my-app 2        e5f6a7b8-…</tspan></text>
    <text x="60" y="186" fill="#ff6b6b">dup <tspan fill="#8a8d90"> my-app 3        12ab34cd-…  … (38 more)</tspan></text>

    <text x="20" y="214" fill="#ff8a8a">   9×<tspan fill="#67b3e6"> …/api-server</tspan></text>
    <text x="60" y="234" fill="#5ad17e">keep<tspan fill="#c7c9cc"> api-server      56ef78ab-…</tspan></text>
