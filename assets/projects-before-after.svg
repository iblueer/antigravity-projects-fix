<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <symbol id="folder" viewBox="0 0 24 24">
      <path d="M2 5.5A1.5 1.5 0 0 1 3.5 4h5.2c.4 0 .78.16 1.06.44L11 5.5h9.5A1.5 1.5 0 0 1 22 7v11a1.5 1.5 0 0 1-1.5 1.5h-17A1.5 1.5 0 0 1 2 18z"
            fill="none" stroke="#9aa0a6" stroke-width="1.6"/>
    </symbol>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2023"/>
      <stop offset="1" stop-color="#191a1c"/>
    </linearGradient>
  </defs>

  <rect width="920" height="540" fill="#0d0d0f"/>

  <!-- ===================== BEFORE ===================== -->
  <text x="40" y="44" fill="#ff6b6b" font-size="20" font-weight="700">Before</text>
  <text x="120" y="44" fill="#6b7075" font-size="14">the 2.0 duplicate bug</text>

  <rect x="40" y="64" width="300" height="440" rx="10" fill="url(#bgGrad)" stroke="#2c2e31"/>
  <!-- header -->
  <text x="62" y="98" fill="#d6d8da" font-size="15" font-weight="600">Projects</text>
  <path d="M286 88 h18 M289 94 h12 M292 100 h6" stroke="#6b7075" stroke-width="1.6" stroke-linecap="round"/>
  <rect x="312" y="86" width="14" height="14" rx="2" fill="none" stroke="#6b7075" stroke-width="1.4"/>
  <path d="M319 89 v8 M315 93 h8" stroke="#6b7075" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="56" y1="114" x2="324" y2="114" stroke="#2c2e31"/>

  <g font-size="14" fill="#c7c9cc">
    <use href="#folder" x="62" y="131" width="18" height="18"/><text x="90" y="145">my-app</text>
    <use href="#folder" x="62" y="161" width="18" height="18"/><text x="90" y="175">my-app 2</text>
    <use href="#folder" x="62" y="191" width="18" height="18"/><text x="90" y="205">my-app 3</text>
    <use href="#folder" x="62" y="221" width="18" height="18"/><text x="90" y="235">my-app 4</text>
    <use href="#folder" x="62" y="251" width="18" height="18"/><text x="90" y="265">my-app 5</text>
    <use href="#folder" x="62" y="281" width="18" height="18"/><text x="90" y="295">my-app 6</text>
    <use href="#folder" x="62" y="311" width="18" height="18"/><text x="90" y="325">…</text>
    <use href="#folder" x="62" y="341" width="18" height="18"/><text x="90" y="355">my-app 39</text>
    <use href="#folder" x="62" y="371" width="18" height="18"/><text x="90" y="385">my-app 40</text>
    <use href="#folder" x="62" y="401" width="18" height="18"/><text x="90" y="415">my-app 41</text>
  </g>
  <!-- duplicate tag -->
  <rect x="240" y="470" width="86" height="22" rx="11" fill="#3a1d1d"/>
  <text x="283" y="485" fill="#ff8a8a" font-size="12" text-anchor="middle">×58 entries</text>

  <!-- ===================== ARROW ===================== -->
  <g>
    <line x1="372" y1="290" x2="540" y2="290" stroke="#3a8f4f" stroke-width="3"/>
    <path d="M538 282 l14 8 l-14 8 z" fill="#3a8f4f"/>
    <rect x="392" y="262" width="128" height="26" rx="13" fill="#16241a" stroke="#2f6b3f"/>
    <text x="456" y="280" fill="#7ee29a" font-size="13" text-anchor="middle" font-family="monospace">consolidate</text>
  </g>

  <!-- ===================== AFTER ===================== -->
  <text x="580" y="44" fill="#5ad17e" font-size="20" font-weight="700">After</text>
  <text x="650" y="44" fill="#6b7075" font-size="14">one entry per real folder</text>

  <rect x="580" y="64" width="300" height="440" rx="10" fill="url(#bgGrad)" stroke="#2c2e31"/>
  <text x="602" y="98" fill="#d6d8da" font-size="15" font-weight="600">Projects</text>
  <path d="M826 88 h18 M829 94 h12 M832 100 h6" stroke="#6b7075" stroke-width="1.6" stroke-linecap="round"/>
  <rect x="852" y="86" width="14" height="14" rx="2" fill="none" stroke="#6b7075" stroke-width="1.4"/>
  <path d="M859 89 v8 M855 93 h8" stroke="#6b7075" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="596" y1="114" x2="864" y2="114" stroke="#2c2e31"/>

  <g font-size="14" fill="#c7c9cc">
    <use href="#folder" x="602" y="131" width="18" height="18"/><text x="630" y="145">api-server</text>
    <use href="#folder" x="602" y="161" width="18" height="18"/><text x="630" y="175">docs-site</text>
    <use href="#folder" x="602" y="191" width="18" height="18"/><text x="630" y="205">my-app</text>
    <use href="#folder" x="602" y="221" width="18" height="18"/><text x="630" y="235">mobile-app</text>
    <use href="#folder" x="602" y="251" width="18" height="18"/><text x="630" y="265">web-client</text>
  </g>
  <rect x="784" y="470" width="80" height="22" rx="11" fill="#16301f"/>
  <text x="824" y="485" fill="#7ee29a" font-size="12" text-anchor="middle">5 clean</text>
