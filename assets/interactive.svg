<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="'Cascadia Code','Consolas',monospace">
  <rect width="760" height="400" rx="10" fill="#0c0c0e"/>
  <rect width="760" height="36" rx="10" fill="#1a1b1e"/>
  <rect y="20" width="760" height="16" fill="#1a1b1e"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="18" r="6" fill="#27c93f"/>
  <text x="380" y="23" fill="#6b7075" font-size="12" text-anchor="middle">antigravity-projects-fix — interactive</text>

  <g font-size="13.5">
    <text x="20" y="66" fill="#e6e8ea" font-weight="700">  Select entries to DELETE</text>
    <text x="20" y="86" fill="#6b7075" font-size="12">  ↑/↓ move · space toggle · a all · n none · d duplicates · enter apply · q quit</text>

    <!-- cursor row highlighted -->
    <rect x="14" y="100" width="732" height="22" rx="4" fill="#15263a"/>
    <text x="20" y="116"><tspan fill="#67b3e6">❯ </tspan><tspan fill="#ff6b6b">[x] </tspan><tspan fill="#e6e8ea" font-weight="700">my-app 2          </tspan><tspan fill="#8a8d90">dup   my-app      e5f6a7b8</tspan></text>

    <text x="20" y="140" fill="#c7c9cc">  <tspan>[ ] </tspan>my-app            <tspan fill="#5ad17e">keep? </tspan><tspan fill="#8a8d90">my-app      a1b2c3d4</tspan></text>
    <text x="20" y="162" fill="#c7c9cc">  <tspan fill="#ff6b6b">[x] </tspan>my-app 3          <tspan fill="#8a8d90">dup   my-app      12ab34cd</tspan></text>
    <text x="20" y="184" fill="#c7c9cc">  <tspan fill="#ff6b6b">[x] </tspan>api-server 2      <tspan fill="#8a8d90">dup   api-server  9f8e7d6c</tspan></text>
    <text x="20" y="206" fill="#c7c9cc">  <tspan>[ ] </tspan>api-server        <tspan fill="#5ad17e">keep? </tspan><tspan fill="#8a8d90">api-server  56ef78ab</tspan></text>
    <text x="20" y="228" fill="#c7c9cc">  <tspan>[ ] </tspan>web-client        <tspan fill="#5ad17e">keep? </tspan><tspan fill="#8a8d90">web-client  33aa22bb</tspan></text>
    <text x="20" y="250" fill="#6b7075">      ↓ 50 more</text>

    <line x1="20" y1="270" x2="740" y2="270" stroke="#26282b"/>
    <text x="20" y="294"><tspan fill="#ff6b6b" font-weight="700">  53 to delete</tspan><tspan fill="#6b7075">  ·  keeping 5</tspan></text>

    <text x="20" y="330" fill="#7ee29a">$ <tspan fill="#9aa0a6">enter →</tspan> <tspan fill="#d6d8da">Review: </tspan><tspan fill="#ff8a8a">53 to delete</tspan><tspan fill="#d6d8da">, keeping 5</tspan></text>
    <text x="20" y="352" fill="#d6d8da">  Delete 53 selected entries? <tspan fill="#6b7075">[y/N]</tspan></text>
    <text x="20" y="378" fill="#6b7075">  ↳ a backup is made automatically before anything is removed</text>
  </g>
</svg>
