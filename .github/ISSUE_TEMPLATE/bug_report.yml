name: 🐛 Bug report
description: Something didn't work as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please **close Antigravity** before running the tool,
        and never paste private folder names/paths you don't want public.
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS (Apple Silicon / M-series)
        - macOS (Intel)
        - Linux
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: v20.11.0
    validations:
      required: true
  - type: input
    id: tool-version
    attributes:
      label: Tool version
      description: Output of `node index.js --version`
      placeholder: 1.1.0
  - type: dropdown
    id: command
    attributes:
      label: Which command?
      options:
        - scan
        - interactive
        - consolidate
        - purge
        - restore
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output / error (optional)
      description: Paste the terminal output. Feel free to redact private project names.
      render: text
